<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Médias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Calcule a média das notas de seus alunos:</h1>
        <input type="text" id="nota1" placeholder="Digite a nota do primeiro trimestre">
        <input type="text" id="nota2" placeholder="Digite a nota do segundo trimestre">
        <input type="text" id="nota3" placeholder="Digite a nota do terceiro trimestre">
        <button onclick="calcularMedia()">Calcular Média</button>
        
        <!-- Resultado será exibido aqui -->
        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
